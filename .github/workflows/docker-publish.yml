name: Publish Docker image

on:
  push:
    branches: [main]

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build-and-push:
    name: Build & push to GHCR
    runs-on: ubuntu-latest

    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract image metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=sha,prefix=main-,format=short
            type=raw,value=latest

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # VITE_API_BASE_URL is baked into the JS bundle at build time.
      # Set it as a repository variable in:
      #   GitHub → Settings → Secrets and variables → Actions → Variables
      # If left unset the app uses relative URLs — update nginx.conf to proxy
      # /properties and /amber/ to your API host in that case.
      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            VITE_API_BASE_URL=${{ vars.VITE_API_BASE_URL }}
            VITE_PRICE_WINDOW_PAST_HOURS=${{ vars.VITE_PRICE_WINDOW_PAST_HOURS || 4 }}
            VITE_PRICE_WINDOW_FUTURE_HOURS=${{ vars.VITE_PRICE_WINDOW_FUTURE_HOURS || 10 }}
            VITE_PROPERTIES_POLL_MS=${{ vars.VITE_PROPERTIES_POLL_MS || 10000 }}
            VITE_PRICES_POLL_MS=${{ vars.VITE_PRICES_POLL_MS || 300000 }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
