name: Frontend CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
    paths:
      - "src/**"
      - "*.ts"
      - "*.js"
      - "*.json"
      - "*.html"
      - ".github/workflows/ci.yml"

jobs:
  lint-and-build:
    name: Lint & build
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Build
        run: npm run build

      - name: Test
        run: npm test --if-present
